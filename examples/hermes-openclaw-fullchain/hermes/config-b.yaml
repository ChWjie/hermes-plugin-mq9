# Hermes-B template for mq9 plugin.
# minimal mode keeps the passive server side-effect free.
model: deepseek-chat
toolsets:
  - hermes-cli
  - mq9
plugins:
  enabled:
    - mq9
  disabled: []
  entries:
    mq9:
      nats_url: nats://127.0.0.1:45222
      agent_name: hermes-b
      mailbox: hermes.b.inbox
      mailbox_ttl: 86400
      auto_register: true
      passive_serve: true
      passive_execute_mode: minimal
      default_discover_limit: 10
      default_call_timeout_s: 30
      default_protocol: a2a
      discovery_require_protocol: true
